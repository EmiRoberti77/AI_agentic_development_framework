<?xml version="1.0" encoding="UTF-8"?>
<svg class="svg-fig" viewBox="0 0 820 300" role="img" aria-label="LangGraph StateGraph diagram" width="820" height="300"><style>
text,.svg-fig{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
.s-box{fill:#fff;stroke:#1c1f26;stroke-width:1.5}
.s-blue{fill:#e8eef2;stroke:#1f4e6b;stroke-width:1.5}
.s-ox{fill:#f6e9e4;stroke:#8a3324;stroke-width:1.5}
.s-gold{fill:#f1f0e2;stroke:#9a7b25;stroke-width:1.5}
.s-green{fill:#e2efe5;stroke:#3f6f4a;stroke-width:1.5}
.s-lbl{font-size:12px;fill:#1c1f26;font-weight:500}
.s-sub{font-size:10px;fill:#6b7180}
.s-edge{stroke:#3c424e;stroke-width:1.5;fill:none}
.s-edge-d{stroke:#3c424e;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
.s-cap{font-size:10.5px;fill:#1f4e6b;letter-spacing:.08em}
</style><rect x="0" y="0" width="820" height="300" fill="#fdfcf8"/>
  <rect x="8" y="8" width="804" height="284" rx="10" fill="#fdfcf8" stroke="#d8d3c4"/>
  <text x="30" y="34" class="s-cap">StateGraph — typed shared state, cyclic, checkpointed</text>

  <!-- state object -->
  <rect x="30" y="210" width="760" height="64" rx="8" class="s-gold"/>
  <text x="46" y="234" class="s-lbl" font-size="12">State (TypedDict) — persisted at every transition by the Checkpointer (Postgres / Redis)</text>
  <text x="46" y="256" class="s-sub">{ messages, plan, retrieved_docs, tool_results, step, needs_review … }  → enables resume · time-travel · audit</text>

  <!-- nodes -->
  <rect x="50" y="60" width="110" height="46" rx="8" class="s-box"/><text x="105" y="88" text-anchor="middle" class="s-lbl" font-size="12">START → plan</text>
  <rect x="220" y="60" width="120" height="46" rx="8" class="s-blue"/><text x="280" y="83" text-anchor="middle" class="s-lbl" font-size="12">agent</text><text x="280" y="98" text-anchor="middle" class="s-sub">reason / decide</text>
  <rect x="400" y="60" width="120" height="46" rx="8" class="s-box"/><text x="460" y="83" text-anchor="middle" class="s-lbl" font-size="12">tools</text><text x="460" y="98" text-anchor="middle" class="s-sub">execute call</text>
  <rect x="580" y="40" width="120" height="40" rx="8" class="s-ox"/><text x="640" y="64" text-anchor="middle" class="s-lbl" font-size="11">human review</text>
  <rect x="580" y="92" width="120" height="40" rx="8" class="s-green"/><text x="640" y="116" text-anchor="middle" class="s-lbl" font-size="12">END</text>

  <!-- edges -->
  <path d="M160 83 h56" class="s-edge" marker-end="url(#ar8)"/>
  <path d="M340 83 h56" class="s-edge" marker-end="url(#ar8)"/>
  <!-- loop back tools->agent -->
  <path d="M460 106 C 460 150, 280 150, 280 108" class="s-edge" marker-end="url(#ar8)"/>
  <text x="330" y="146" class="s-sub" font-size="9">observe → loop (cycle)</text>
  <!-- conditional edges from agent -->
  <path d="M400 72 C 560 72, 540 60, 578 60" class="s-edge-d" marker-end="url(#ar8)"/>
  <path d="M520 90 C 560 100, 560 110, 578 110" class="s-edge-d" marker-end="url(#ar8)"/>
  <text x="528" y="44" class="s-sub" font-size="9" fill="#8a3324">if high-risk</text>
  <text x="524" y="128" class="s-sub" font-size="9" fill="#3f6f4a">if done</text>
  <path d="M640 80 v12" class="s-edge-d"/>
  <defs><marker id="ar8" markerWidth="8" markerHeight="8" refX="5.5" refY="4" orient="auto">
    <path d="M0 0 L8 4 L0 8 z" fill="#3c424e"/></marker></defs>
</svg>