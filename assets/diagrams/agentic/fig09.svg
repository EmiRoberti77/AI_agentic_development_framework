<?xml version="1.0" encoding="UTF-8"?>
<svg class="svg-fig" viewBox="0 0 820 300" role="img" aria-label="Customization ladder and LoRA decomposition" width="820" height="300"><style>
text,.svg-fig{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
.s-box{fill:#fff;stroke:#1c1f26;stroke-width:1.5}
.s-blue{fill:#e8eef2;stroke:#1f4e6b;stroke-width:1.5}
.s-ox{fill:#f6e9e4;stroke:#8a3324;stroke-width:1.5}
.s-gold{fill:#f1f0e2;stroke:#9a7b25;stroke-width:1.5}
.s-green{fill:#e2efe5;stroke:#3f6f4a;stroke-width:1.5}
.s-lbl{font-size:12px;fill:#1c1f26;font-weight:500}
.s-sub{font-size:10px;fill:#6b7180}
.s-edge{stroke:#3c424e;stroke-width:1.5;fill:none}
.s-edge-d{stroke:#3c424e;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
.s-cap{font-size:10.5px;fill:#1f4e6b;letter-spacing:.08em}
</style><rect x="0" y="0" width="820" height="300" fill="#fdfcf8"/>
  <rect x="8" y="8" width="804" height="284" rx="10" fill="#fdfcf8" stroke="#d8d3c4"/>
  <text x="30" y="34" class="s-cap">The ladder — cheap &amp; fast → expensive &amp; permanent</text>
  <g>
    <rect x="30" y="48" width="170" height="40" rx="6" class="s-green"/><text x="42" y="66" class="s-lbl" font-size="12">1 · Prompt engineering</text><text x="42" y="80" class="s-sub">minutes · zero infra</text>
    <rect x="30" y="96" width="220" height="40" rx="6" class="s-blue"/><text x="42" y="114" class="s-lbl" font-size="12">2 · RAG (facts)</text><text x="42" y="128" class="s-sub">hours–days · updatable, cited</text>
    <rect x="30" y="144" width="270" height="40" rx="6" class="s-gold"/><text x="42" y="162" class="s-lbl" font-size="12">3 · Fine-tune: LoRA/QLoRA (form)</text><text x="42" y="176" class="s-sub">~1 week · behaviour, style, format</text>
    <rect x="30" y="192" width="320" height="40" rx="6" class="s-ox"/><text x="42" y="210" class="s-lbl" font-size="12">4 · Distill / full FT (rare)</text><text x="42" y="224" class="s-sub">weeks · only when LoRA underperforms</text>
  </g>
  <text x="36" y="256" class="s-sub" font-size="9.5">~80% of "we need fine-tuning" is solved at rung 1–2.</text>

  <!-- LoRA decomposition -->
  <text x="430" y="34" class="s-cap">LoRA — freeze W, train low-rank A·B</text>
  <g transform="translate(430,52)">
    <rect x="0" y="20" width="80" height="80" class="s-box"/><text x="40" y="64" text-anchor="middle" class="s-lbl">W₀</text><text x="40" y="116" text-anchor="middle" class="s-sub" font-size="9">frozen (d×d)</text>
    <text x="92" y="66" class="s-lbl" font-size="18">+</text>
    <rect x="112" y="20" width="20" height="80" class="s-ox"/><text x="122" y="116" text-anchor="middle" class="s-sub" font-size="9">B (d×r)</text>
    <text x="138" y="66" class="s-lbl" font-size="14">·</text>
    <rect x="150" y="50" width="80" height="20" class="s-ox"/><text x="190" y="116" text-anchor="middle" class="s-sub" font-size="9">A (r×d)</text>
    <text x="244" y="66" class="s-lbl" font-size="16">→</text>
    <rect x="262" y="20" width="80" height="80" class="s-blue"/><text x="302" y="64" text-anchor="middle" class="s-lbl">W′</text>
    <text x="20" y="150" class="s-sub" font-size="10">trainable params = the thin A,B only (rank r ≈ 8–64)</text>
    <text x="20" y="166" class="s-sub" font-size="10">→ ~0.1–1% of weights · single GPU · adapters hot-swap</text>
  </g>
</svg>