<?xml version="1.0" encoding="UTF-8"?>
<svg class="svg-fig" viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Package topology of the LangChain and LangGraph stack" width="760" height="330"><style>
text,.svg-fig{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
.s-box{fill:#fff;stroke:#1c1f26;stroke-width:1.5}
.s-blue{fill:#e8eef2;stroke:#1f4e6b;stroke-width:1.5}
.s-ox{fill:#f6e9e4;stroke:#8a3324;stroke-width:1.5}
.s-gold{fill:#f1f0e2;stroke:#9a7b25;stroke-width:1.5}
.s-green{fill:#e2efe5;stroke:#3f6f4a;stroke-width:1.5}
.s-lbl{font-size:12px;fill:#1c1f26;font-weight:500}
.s-sub{font-size:10px;fill:#6b7180}
.s-edge{stroke:#3c424e;stroke-width:1.5;fill:none}
.s-edge-d{stroke:#3c424e;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
.s-cap{font-size:10.5px;fill:#1f4e6b;letter-spacing:.08em}
</style><rect x="0" y="0" width="760" height="330" fill="#fdfcf8"/>
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3c424e"/></marker></defs>
  <text x="20" y="26" class="s-cap">Your application</text>
  <rect x="20" y="36" width="720" height="48" rx="7" class="s-box"/>
  <text x="38" y="58" class="s-lbl">create_agent(...)  — or —  StateGraph(...).compile()</text>
  <text x="38" y="74" class="s-sub">your nodes, tools, prompts, middleware</text>

  <text x="20" y="118" class="s-cap">Framework layer (DX)</text>
  <rect x="20" y="128" width="350" height="56" rx="7" class="s-blue"/>
  <text x="38" y="150" class="s-lbl">langchain  1.3.x</text>
  <text x="38" y="167" class="s-sub">create_agent, middleware, agent loop</text>

  <rect x="390" y="128" width="350" height="56" rx="7" class="s-box"/>
  <text x="408" y="150" class="s-lbl">langchain-core  1.4.x</text>
  <text x="408" y="167" class="s-sub">Runnable, messages, tools, prompts, output parsers</text>

  <text x="20" y="218" class="s-cap">Runtime layer</text>
  <rect x="20" y="228" width="230" height="56" rx="7" class="s-gold"/>
  <text x="38" y="250" class="s-lbl">langgraph  1.2.x</text>
  <text x="38" y="267" class="s-sub">StateGraph, Pregel engine</text>

  <rect x="270" y="228" width="230" height="56" rx="7" class="s-green"/>
  <text x="288" y="250" class="s-lbl">langgraph-checkpoint 4.x</text>
  <text x="288" y="267" class="s-sub">persistence: memory / sqlite / postgres</text>

  <rect x="520" y="228" width="220" height="56" rx="7" class="s-box"/>
  <text x="538" y="250" class="s-lbl">partner packages</text>
  <text x="538" y="267" class="s-sub">langchain-openai, -anthropic, …</text>

  <path class="s-edge" marker-end="url(#ar)" d="M195,84 L195,126"/>
  <path class="s-edge" marker-end="url(#ar)" d="M195,184 L135,226"/>
  <path class="s-edge-d" marker-end="url(#ar)" d="M250,156 L388,156"/>
  <path class="s-edge" marker-end="url(#ar)" d="M135,284 L300,284 L385,250" opacity="0"/>
  <text x="300" y="150" class="s-sub" transform="rotate(0)">builds on</text>
</svg>