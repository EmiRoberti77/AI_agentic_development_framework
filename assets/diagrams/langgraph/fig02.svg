<?xml version="1.0" encoding="UTF-8"?>
<svg class="svg-fig" viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Data flow through an LCEL RAG chain" width="760" height="250"><style>
text,.svg-fig{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
.s-box{fill:#fff;stroke:#1c1f26;stroke-width:1.5}
