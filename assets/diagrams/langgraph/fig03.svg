<?xml version="1.0" encoding="UTF-8"?>
<svg class="svg-fig" viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bulk synchronous parallel super-steps" width="760" height="300"><style>
text,.svg-fig{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
.s-box{fill:#fff;stroke:#1c1f26;stroke-width:1.5}
.s-blue{fill:#e8eef2;stroke:#1f4e6b;stroke-width:1.5}
.s-ox{fill:#f6e9e4;stroke:#8a3324;stroke-width:1.5}
.s-gold{fill:#f1f0e2;stroke:#9a7b25;stroke-width:1.5}
.s-green{fill:#e2efe5;stroke:#3f6f4a;stroke-width:1.5}
.s-lbl{font-size:12px;fill:#1c1f26;font-weight:500}
.s-sub{font-size:10px;fill:#6b7180}
.s-edge{stroke:#3c424e;stroke-width:1.5;fill:none}
.s-edge-d{stroke:#3c424e;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
.s-cap{font-size:10.5px;fill:#1f4e6b;letter-spacing:.08em}
</style><rect x="0" y="0" width="760" height="300" fill="#fdfcf8"/>
  <defs><marker id="ar3" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3c424e"/></marker></defs>
  <!-- barriers -->
  <line x1="250" y1="20" x2="250" y2="280" stroke="#8a3324" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="510" y1="20" x2="510" y2="280" stroke="#8a3324" stroke-width="1.4" stroke-dasharray="4 4"/>
  <text x="135" y="30" text-anchor="middle" class="s-cap">super-step n</text>
  <text x="380" y="30" text-anchor="middle" class="s-cap">super-step n+1</text>
  <text x="635" y="30" text-anchor="middle" class="s-cap">n+2</text>

  <!-- step n: two parallel nodes -->
  <rect x="40" y="70" width="160" height="40" rx="6" class="s-blue"/>
  <text x="120" y="94" text-anchor="middle" class="s-lbl">node A (active)</text>
  <rect x="40" y="170" width="160" height="40" rx="6" class="s-blue"/>
  <text x="120" y="194" text-anchor="middle" class="s-lbl">node B (active)</text>
  <text x="120" y="240" text-anchor="middle" class="s-sub">run in parallel</text>
  <text x="120" y="254" text-anchor="middle" class="s-sub">read start-of-step state</text>

  <!-- barrier merge -->
  <text x="250" y="150" text-anchor="middle" class="s-sub" transform="rotate(-90 250 150)">reduce &amp; checkpoint</text>

  <!-- step n+1 -->
  <rect x="300" y="120" width="160" height="40" rx="6" class="s-gold"/>
  <text x="380" y="144" text-anchor="middle" class="s-lbl">node C (active)</text>
  <text x="380" y="185" text-anchor="middle" class="s-sub">sees merged writes</text>
  <text x="380" y="199" text-anchor="middle" class="s-sub">of A and B</text>

  <!-- step n+2 -->
  <rect x="560" y="120" width="150" height="40" rx="6" class="s-green"/>
  <text x="635" y="144" text-anchor="middle" class="s-lbl">END</text>

  <path class="s-edge" marker-end="url(#ar3)" d="M200,90 L300,132"/>
  <path class="s-edge" marker-end="url(#ar3)" d="M200,190 L300,148"/>
  <path class="s-edge" marker-end="url(#ar3)" d="M460,140 L558,140"/>
</svg>